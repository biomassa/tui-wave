# ---- Tier 2 "hard tier" batch 2 (2026-07-16): remaining repitch curve-transform processes ----
# See CDP-Ext-Plan.md Phase 4. All entries below verified against the real binary (CDP8;
# its usage banner misleadingly prints "CDP Release 7.1 2016", a stale version string never
# bumped past the old release — see README.md) using a genuine `getpitch` mode-1 binary
# pitchfile derived from a synthesized 220Hz tone (`synth wave` -> `pvoc anal` -> `repitch
# getpitch 1`), per this session's standing curve-family methodology. Every subprogram in
# this family exposes 2+ modes where only the
# odd-numbered/first mode gives "a pitchfile as output" (the rest give a transposition file,
# a ratio/semitone-shaped concept out of scope for this app's Hz-based curve display) --
# only pitchfile-output modes are cataloged here. All numeric ranges below are the exact
# bounds CDP's own "Parameter[n] Value (...) out of range (lo to hi)" errors reported when
# probed with an out-of-range value against the real binary and this specific test fixture
# (a ~1.02s file at the default `pvoc anal` window); several (timestep/timeframe/trange/
# srange/vibfreq) are themselves a function of the input file's own duration and analysis
# window size ("duration of 1 analysis window to duration of entire file" per each
# subprogram's usage text) -- the catalog bounds below are deliberately generous safety caps
# (matching this catalog's existing convention for file-relative time fields, e.g. Grain
# Onset Times' 7200s/2hr cap), not this one fixture's exact runtime-legal range; CDP enforces
# the real per-file bounds itself at run time regardless of what the catalog allows through.
#
# `insertzeros`/`insertsil` datafile-format finding: probed empirically (as scoped) by
# writing the same 4 times as a flat one-per-line list, a two-per-line "start end" list, and
# a tab-separated list, then reading the resulting binary pitch-WAV's raw `data` chunk floats
# directly (CDP's own `pchtotext` silently omits/bridges over unpitched-marker regions when
# the surrounding curve is near-constant, so a text round-trip alone can't distinguish "did
# nothing" from "worked but looks identical" -- confirmed this the hard way against a
# real-binary result before trusting any negative result). All three delimiter variants
# produced byte-identical output, and the marked regions landed exactly on the requested
# time ranges (confirmed via direct chunk inspection: -1.0 sentinel values for `insertzeros`,
# -2.0 for `insertsil`, appearing precisely between the given start/end pairs) -- CDP reads
# the file as a flat whitespace-tokenized stream of numbers with no line-structure
# requirement at all, i.e. exactly this catalog's existing `required_list` shape (an ordered,
# strictly-ascending flat list), not a bespoke pairs format needing new infra. Mode 2
# (sample-count data) was verified the same way and produced identical marked ranges to mode
# 1's time-based data for the equivalent positions -- confirmed both modes are legitimate
# alternate encodings of the same real action (not a pitchfile/transposition split), so both
# are cataloged. The app has no built-in enforcement that a `required_list` entry count stays
# even (each pair needs a start and an end) -- documented in each param's description as a
# user-facing caveat rather than new validation infra.

