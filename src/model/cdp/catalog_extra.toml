automatable = false
kind = "number"
min = 0.1
max = 5.0
step = 0.01
default = 0.5
exponential = true
scale = "capped_at_input_duration"

[[process.params]]
name = "Gate Level"
description = "Minimum signal level for a grain to be detected"
flag = "-l"
automatable = false
kind = "number"
