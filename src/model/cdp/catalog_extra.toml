# `distcut`/`cantor`'s glob-output shape uses, but for a process with NO real input at all
# (`IoKind::None`). `plan_job`'s `IoKind::WavGlob` branch unconditionally indexes
# `inputs[0]` before ever checking `def.input`, so a synthesis process (0 expected inputs)
# declaring `output = "wav_glob"` would panic at plan time, not error cleanly -- a real gap,
