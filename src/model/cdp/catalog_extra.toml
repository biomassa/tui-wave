# `packet` (CDP-WASM-SUITE-gaps.md: "Sound packet"/"Wave-packet synth"). The binary writes its
# result as "<outfile-stem>0.wav" regardless of what outfile name it's given -- confirmed live
# (2026-07-22) by invoking it with the bare stem "cutout" (no extension) and finding the result
# at exactly "cutout0.wav". That's precisely the fixed stem/pattern `plan_wav_glob`
# (pipeline.rs) already passes to any `output = "wav_glob"` process (previously only
# distcut/cantor) -- packet doesn't care what stem it's told to use, so it needs no pipeline.rs
# change at all, just this `output` declaration. Each result opens as its own new buffer
# (`IoKind::WavGlob`'s existing "each file becomes its own new buffer" behavior) rather than
# splicing into the selection -- reasonable here since a packet is typically much shorter than
# the source it's drawn from.
[[process]]
key = "packet_packet_2"
bin = "packet"
subprog = "packet"
mode = "2"
title = "Sound Packet (Forced)"
category = "time"
subcategory = "synthesis"
short_description = "Creates a sound packet with an enveloped shape at a chosen time"
description = "Verified against the real binary and a live invocation: `packet packet 2 infile outfile times dur narrowing centring [-n|-f] [-s]`. TIMES is simplified to a single time (CDP's own \"or textfile of times\" alternative isn't representable by this catalog's param shapes)."
input = "wav"
output = "wav_glob"
stereo_native = false
output_is_stereo = false

[[process.params]]
name = "Time"
description = "Time (seconds) at which the packet is created"
automatable = true
kind = "number"
min = 0.0
max = 7200.0
step = 0.01
default = 0.5
exponential = false
scale = "capped_at_input_duration"

[[process.params]]
name = "Duration"
description = "Duration of the created packet, in milliseconds"
automatable = true
kind = "number"
min = 1.0
max = 5000.0
step = 1.0
default = 100.0
exponential = true
scale = "plain"

[[process.params]]
name = "Narrowing"
description = "Narrowing of the packet's envelope (values below 1.0 broaden it; very low values near 0 may click)"
automatable = true
kind = "number"
min = 0.0
max = 1000.0
step = 0.1
default = 5.0
exponential = true
scale = "plain"

[[process.params]]
name = "Centring"
description = "Position of the packet's envelope centre within its duration (0 = left, 1 = right)"
automatable = true
kind = "number"
min = 0.0
max = 1.0
step = 0.01
default = 0.5
exponential = false
scale = "plain"

[[process]]
key = "packet_packet_1"
bin = "packet"
subprog = "packet"
mode = "1"
title = "Sound Packet (Found)"
category = "time"
subcategory = "synthesis"
short_description = "Isolates an existing sound packet using signal minima as its edges"
description = "Verified against the real binary's own usage text (argv shape identical to mode 2, with Min Duration replacing Duration): `packet packet 1 infile outfile times mindur narrowing centring [-n|-f] [-s]`. TIMES simplified to a single time, same rationale as `packet_packet_2`."
input = "wav"
output = "wav_glob"
stereo_native = false
output_is_stereo = false

[[process.params]]
