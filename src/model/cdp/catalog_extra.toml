# ---- Tier 1b (2026-07-14): hilite band -- the first (and most complex) shipped
# ParamKind::HiliteBand process. Real ranges/behavior probed by hand against the binary:
# lofrq/hifrq must be > 0 (a negative value is rejected: "freq -100.00 out of range (>0 to
# 22050.000000[nyquist])"), but the upper bound is lenient in practice (a hifrq well past
# nyquist still succeeded) and lofrq > hifrq is accepted without error -- so both use a
# plain generous 1.0-22050.0 range rather than a dynamic per-sample-rate scale. amp1/amp2
# accept negative values (phase inversion) and large multipliers without complaint. The
# transpose value is the one genuine hazard found: a NEGATIVE plain multiplier crashes the
# binary outright ("INTERNAL ERROR: (Bug?) -ve frequency in
# get_channel_corresponding_to_frq()"), while 0 and positive multipliers, and negative
# *additive* Hz values (the '+' prefix mode), are all fine -- the catalog's own min is
# floored at 0.0 to rule out the crash entirely (a real CDP bug, not a tui-wave one, same
# "tighten the range past a found crash boundary" precedent as frfractal's Layers/Splice
# Length), even though this means negative-Hz additive shifts aren't reachable through this
# UI -- a narrower but safe tradeoff given the alternative is a real crash.

[[process]]
key = "hilite_band"
bin = "hilite"
subprog = "band"
