# ---- Tier 1: glob (multi-file) output infrastructure (2026-07-09) ---------------------
#
# distcut/envcut cut the source into an unknown number of falling-envelope segments,
# writing each as its own numbered file (cutout0.wav, cutout1.wav, ...) instead of one
# result. `IoKind::WavGlob` (see model/cdp/def.rs and pipeline::plan_wav_glob) is the new
# infrastructure that makes this possible: the runner loads every numbered file it finds,
# and the UI opens each as its own new buffer (Apply only — there's no single "the result"
# to Preview, so Preview plays just the first segment as a representative sample).

[[process]]
key = "distcut_distcut_1"
bin = "distcut"
subprog = "distcut"
mode = "1"
title = "Cut Into Wavecycle Groups"
category = "time"
subcategory = "segment"
short_description = "Cuts the sound into separate files, one per group of wavesets, each with a falling envelope"
description = """
Cuts the sound into disjunct groups of wavesets, applying a falling envelope to each, and \
writes every group as its own new buffer — a way to chop a texture into a set of separate \
short decaying events.
"""
input = "wav"
output = "wav_glob"
stereo_native = false
output_is_stereo = false

[[process.params]]
name = "Cycle Count"
description = "Number of wavesets in each output segment"
automatable = false
kind = "number"
min = 1.0
max = 200.0
step = 1.0
default = 10.0
exponential = true
scale = "plain"

[[process.params]]
name = "Decay Shape"
description = "Envelope decay shape: 1 = linear, above 1 = more rapid decay, below 1 = less rapid"
automatable = false
kind = "number"
min = 0.1
max = 10.0
step = 0.1
default = 1.0
exponential = true
scale = "plain"

[[process.params]]
name = "Limit"
description = "Minimum level of output events to accept, in dB below full scale"
automatable = false
kind = "number"
min = 0.0
max = 96.0
step = 1.0
default = 70.0
exponential = false
scale = "plain"
flag = "-c"

# envcut_envcut_1 was tried here and deliberately NOT included: mode 1 consistently rejects
# the *last* (necessarily truncated) segment near the end of the file with "Attack too long
# for envelope event", reproduced across three different test files (1s/2s-with-fadeout/3s)
# and multiple attack/envlen combinations — a near-universal boundary problem, not a
# fixture-content issue like the entries in cdp::runner's KNOWN_FIXTURE_FAILURES list.
# distcut (the same "cut into numbered segments" family, plain waveset-count based rather
# than envelope-boundary based) has no such issue and is included above.

# ---- Tier 1b batch 1 (2026-07-09): first required_envelope processes ----
# See CDP-Ext-Plan.md Phase 3 -- these are the first catalog entries whose only "value" IS a
# breakpoint textfile (never a constant), the ParamDef.required_envelope capability. All
# three families (focus, fractal, iterline) confirmed against the real CDP binaries' own
# usage text before authoring; ranges not stated explicitly in that text are conservative
# guesses, refined against catalog_smoke_test the same way every earlier batch was.

[[process]]
key = "focus_hold"
bin = "focus"
subprog = "hold"
title = "Hold"
category = "pvoc"
subcategory = "time"
short_description = "Freezes the spectrum at chosen times, each held for a given duration"
description = """
Holds the sound's spectral content at a series of times, each hold expanded to a given \
duration before the sound continues -- like inserting a series of spectral freezes into \
the timeline. Because each hold adds its own duration to the sound, the output is longer \
than the input.
"""
input = "ana"
output = "ana"
stereo_native = false
output_is_stereo = false

[[process.params]]
name = "Hold Times & Durations"
description = "Time/hold-duration pairs (in seconds) -- the point's time is when the spectrum is held, its value is how long to hold it"
automatable = true
required_envelope = true
kind = "number"
min = 0.0
max = 30.0
step = 0.1
default = 0.5
exponential = false
scale = "plain"

[[process]]
key = "fractal_wave_1"
bin = "fractal"
subprog = "wave"
mode = "1"
title = "Fractal Distort"
category = "time"
subcategory = "distort"
short_description = "Fractally distorts the sound with time-varying transpositions following a pitch-time shape"
description = """
Fractally distorts the sound by repeatedly applying a transposition-over-time shape to \
itself at every smaller time-scale the pattern divides into, causing corresponding time \
contractions and expansions at each level. The shape's own final time sets the duration \
of the largest repeating unit; everything below that is generated by re-applying the \
same shape recursively.
"""
input = "wav"
output = "wav"
stereo_native = false
output_is_stereo = false

[[process.params]]
name = "Shape"
description = "Time-transposition pairs (semitones, -12 to 12) defining the fractal's pitch-time contour; times must start at 0 and increase, final time sets the pattern's duration"
automatable = true
required_envelope = true
kind = "number"
min = -12.0
max = 12.0
step = 0.1
default = 0.0
exponential = false
scale = "plain"

[[process.params]]
name = "Max Fractalisation"
description = "Maximum degree of fractal subdivision; 0 means subdivide until the smallest possible wavelength is reached"
flag = "-m"
automatable = true
kind = "number"
min = 0.0
max = 20.0
step = 1.0
default = 0.0
exponential = false
scale = "plain"

[[process.params]]
name = "Time Stretch"
description = "Time-stretch factor applied to the fractal pattern (CDP-enforced range 1.0-2.0; the usage text's claim that 0 disables timestretching only applies to omitting the flag entirely, which this UI never does)"
flag = "-t"
automatable = true
kind = "number"
min = 1.0
max = 2.0
step = 0.01
default = 1.0
exponential = false
scale = "plain"

[[process.params]]
name = "Interval Warp"
description = "Interval-warping factor applied to the fractal pattern; 0 disables warping"
flag = "-i"
automatable = true
kind = "number"
min = 0.0
max = 10.0
step = 0.1
default = 0.0
exponential = false
scale = "plain"

[[process.params]]
name = "Shrink Intervals"
description = "Shrink pitch-intervals proportionally as the fractal time-scale shrinks"
flag = "-s"
automatable = false
kind = "toggle"
default = false

[[process.params]]
name = "Read Time From Outfile"
description = "Interpret the shape's breakpoint times against the (stretched) output timeline instead of the input timeline"
flag = "-o"
automatable = false
kind = "toggle"
default = false

[[process]]
key = "fractal_wave_2"
bin = "fractal"
subprog = "wave"
mode = "2"
title = "Fractal Wavecycle Generator"
category = "time"
subcategory = "synthesis"
short_description = "Generates a fractal waveform from a single input wavecycle, following a pitch-time shape"
description = """
Generates a new sound from a single (mono) input wavecycle by repeatedly applying a \
pitch-time shape to it at every smaller time-scale, the same fractal process as Fractal \
Distort but building a fresh waveform outward from one cycle rather than distorting an \
existing sound. The shape's own final time sets the duration of the largest repeating \
unit.
"""
input = "wav"
output = "wav"
stereo_native = false
output_is_stereo = false

[[process.params]]
name = "Shape"
description = "Time-MIDIpitch pairs (0 to 127) defining the fractal's pitch-time contour; times must start at 0 and increase, final time sets the pattern's duration"
automatable = true
required_envelope = true
kind = "number"
min = 0.0
max = 127.0
step = 1.0
default = 60.0
exponential = false
scale = "plain"

[[process.params]]
name = "Output Duration"
description = "Duration of the generated sound, in seconds (max 2 hours)"
automatable = false
kind = "number"
min = 0.1
max = 7200.0
step = 0.1
default = 5.0
exponential = true
scale = "output_duration_seconds"

[[process.params]]
name = "Max Fractalisation"
description = "Maximum degree of fractal subdivision; 0 means subdivide until the smallest possible wavelength is reached"
flag = "-m"
automatable = true
kind = "number"
min = 0.0
max = 20.0
step = 1.0
default = 0.0
exponential = false
scale = "plain"

[[process.params]]
name = "Time Stretch"
description = "Time-stretch factor applied to the fractal pattern (CDP-enforced range 1.0-2.0; the usage text's claim that 0 disables timestretching only applies to omitting the flag entirely, which this UI never does)"
flag = "-t"
automatable = true
kind = "number"
min = 1.0
max = 2.0
step = 0.01
default = 1.0
exponential = false
scale = "plain"

[[process.params]]
name = "Interval Warp"
description = "Interval-warping factor applied to the fractal pattern; 0 disables warping"
flag = "-i"
automatable = true
kind = "number"
min = 0.0
max = 10.0
step = 0.1
default = 0.0
exponential = false
scale = "plain"

[[process.params]]
name = "Shrink Intervals"
description = "Shrink pitch-intervals proportionally as the fractal time-scale shrinks"
flag = "-s"
automatable = false
kind = "toggle"
default = false

[[process]]
