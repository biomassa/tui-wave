# ---- CDP-WASM-SUITE gap-list implementation (2026-07-22) ----------------------------
# New entries added following CDP-WASM-SUITE-gaps.md's confirmed-gap list (all verified
# against the real binary per this file's own header convention). Multichannel-family gaps
# (mchanpan/abfpan/panorama/spacedesign/texmchan) deliberately excluded -- this app's UI/audio
# path is stereo-focused and untested beyond 2 channels, see CDP-WASM-SUITE-gaps.md. Also
# excluded and documented as needing further work, not silently dropped: `filter iterated`
# (crashes with an internal "readsamps_with_wrap()" bug across every parameter combination
# tried -- a real binary bug, not a catalog-authoring mistake, same class of issue as
# `modify_convolve_1`'s skip-note above); `distort shuffle` and `grain reorder` (both need a
# free-text domain/reorder-code param this catalog's ParamKind has no variant for);
# `repitch invert` (needs a real pitch-detected fixture to verify -- a synthesized test tone
# didn't produce a valid pitchfile via `repitch getpitch 1` for reasons not diagnosed here);
# `multisynth` (its score format -- an instrument name followed by a variable-length run of
# time/pitch/loudness/duration 4-tuples on one line -- doesn't fit any ParamKind, including
# Table, which requires a fixed column count); and `texture` (a genuinely large parameter
# surface -- 13+ numeric params plus a bespoke harmonic-field/pitch notedata file format per
# mode -- that needs its own dedicated research pass, not a quick addition here). `packet`
# (both modes) IS included, at the very end of this section, past `clip_clip_1` -- see the
# note there: its "<outfile-stem>0.wav" numbered-output quirk turned out to already be exactly
# what `output = "wav_glob"` (pipeline.rs's `plan_wav_glob`, previously only distcut/cantor)
# passes to any single-input process, so it needed no pipeline.rs change after all.
#
# Full smoke-tested (`TUI_WAVE_CDP_SMOKE=1 cargo test catalog_smoke_test`) against every entry
# below except `grain_align` (added to runner.rs's KNOWN_FIXTURE_FAILURES -- needs real grain-
# like amplitude variation this harness's constant-tone fixture doesn't have, same class of
# issue as the pre-existing `grain_reverse`/`grainex_extend` entries there).
