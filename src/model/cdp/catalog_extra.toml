bin = "modify"
subprog = "space"
mode = "4"
title = "Modify Narrow Stereo Image"
category = "time"
subcategory = "space"
short_description = "Narrows (or widens/inverts) the stereo image of a sound"
description = """
Narrows the stereo image toward mono: 1 leaves it unchanged, 0.5 narrows it by half, 0 \
collapses it to mono. Negative values narrow similarly but also invert the stereo image. \
Requires a stereo file.
"""
input = "wav"
output = "wav"
stereo_native = true
output_is_stereo = true

[[process.params]]
name = "Narrowing"
description = "Stereo image narrowing: 1 = unchanged, 0 = mono, negative also inverts"
automatable = true
kind = "number"
min = -1.0
max = 1.0
step = 0.01
default = 0.5
exponential = false
scale = "plain"

