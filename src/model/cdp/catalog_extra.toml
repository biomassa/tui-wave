[[process.params]]
name = "Window Size"
description = "Size of the window used to find grains, in milliseconds"
automatable = false
kind = "number"
min = 1.0
max = 1000.0
step = 1.0
default = 20.0
exponential = true
scale = "plain"

[[process.params]]
name = "Trough Height"
description = "Acceptable trough height relative to adjacent peaks (0 to 1, exclusive)"
automatable = false
kind = "number"
min = 0.01
max = 0.99
step = 0.01
default = 0.5
exponential = false
scale = "plain"

[[process.params]]
name = "Duration To Add"
description = "How much duration to add to the source, in seconds"
automatable = false
kind = "number"
min = 0.01
max = 60.0
step = 0.01
default = 1.0
exponential = true
scale = "plain"

[[process.params]]
name = "Start Time"
description = "Start time of the grain material within the source, in seconds"
automatable = false
kind = "number"
min = 0.0
max = 3600.0
step = 0.01
default = 0.0
exponential = false
scale = "plain"

[[process.params]]
name = "End Time"
description = "End time of the grain material within the source, in seconds"
automatable = false
kind = "number"
min = 0.01
max = 3600.0
step = 0.01
default = 0.5
exponential = true
scale = "plain"

