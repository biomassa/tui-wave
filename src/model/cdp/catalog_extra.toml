# rejects every documented-valid argv shape with "Insufficient parameters on cmdline"
# regardless of how many extra positional values are appended (tested extensively -- mode
# range turned out to be 1-4 not the documented 1-2, outduration's real range is 1 to
# 32767, but even a fully in-range invocation with no optional flags at all still reports
# insufficient parameters, and adding flags is never reached: "-dN" is always read back as
# an unconsumed positional, one slot further out each time an extra positional is added).
# Usage-text/binary mismatch, not a tui-wave argv-shape bug -- revisit if a later CDP
# release fixes or documents the real requirement.

