# tried here and deliberately NOT included: the real binary fails every invocation --
# every parameter value combination tested, on multiple real WAV files (both the project's
# own 16-bit fixture and freshly ffmpeg-generated ones, ruling out any WAV-format quirk) --
# with the same "ERROR: INTERNAL ERROR: (Bug?)\nERROR: Failed to parse input file N" (N
# happens to equal the mode number, 1 or 2, which looks like an internal index reused by
# coincidence rather than anything about the actual input file). Confirmed this isn't an
# argv-shape or param-range problem on this project's end: the binary rejects the identical
# argv pattern regardless of which values are passed, including maximally simple
# whole-number values. Same class of finding as `iterline`'s earlier removal -- a real bug
# in this CDP release's binary, not something a catalog fix can work around.

[[process]]
key = "frfractal_fractal"
bin = "frfractal"
subprog = "fractal"
title = "Frfractal Fractalize"
category = "time"
subcategory = "distort"
short_description = "Creates a fractalized, self-layered version of a sound"
description = "This process builds a fractalized version of a sound by layering self-similar copies of it. Higher layer counts produce denser, longer, and more chaotic textures -- the practical maximum depends on the input's duration and the splice length used."
input = "wav"
output = "wav"
stereo_native = true
output_is_stereo = false

[[process.params]]
name = "Layers"
description = "Number of fractal layers in the output; large values can produce very long, memory-heavy output"
automatable = false
kind = "number"
# The real binary rejects 1 ("out of range (2.0 to 100.0)") and reliably crashes
# (`malloc(): invalid next size (unsorted)`) at exactly 2, confirmed against both a 2s and a
# 5s test file -- a genuine bug in this CDP release, not an argv-shape issue (same class of
# finding as `iterline`'s dropped modes). 3 works but already grows a 2-second input into a
# 15+ second output, matching the usage text's own "very long output" warning -- max capped
# well below the binary's own literal ceiling (100) to keep the slider's range musically
# useful; the binary cleanly reports its own real per-file ceiling ("Maximum number of
# fractal cuts for this file = N") when a value is too large for a given selection, which
# surfaces through the existing CDP error dialog without needing new scale infra.
min = 3.0
max = 20.0
step = 1.0
default = 3.0
exponential = false
scale = "plain"

[[process.params]]
name = "Splice Length"
description = "Length of splices, in milliseconds"
automatable = false
kind = "number"
# Bisected against the real binary: at Layers=3, splice values of 15 and 20 both reliably
# crash it (same `malloc(): invalid next size (unsorted)` bug, independent of the input's
# own duration -- reproduced on 1s, 2s, and 5s files alike), while 25 and 30 both run
# cleanly. Floor raised to 25 (with margin) rather than the binary's own literal minimum,
# to keep the default combination smoke-test-clean; a value in the crashing 1-20 band would
# only be reachable by lowering this catalog's own min, not by anything a user types in
# past this range.
min = 25.0
max = 200.0
step = 1.0
default = 30.0
exponential = false
scale = "plain"
flag = "-s"

