# ---- Tier 1b (2026-07-13): blur weave -- fits the existing required_list mechanism as-is,
# no new editor needed. CDP itself enforces the real (file-duration-dependent) step range at
# runtime with a clear error ("Weave value N out of range (-X to Y) for this file") --
# verified against the real binary -- so the catalog's own min/max stay a generous static
# safety cap, same as every other Plain-scale param whose true ceiling isn't capturable by an
# existing NumberScale variant.

[[process]]
key = "blur_weave"
bin = "blur"
subprog = "weave"
title = "Blur Weave"
category = "pvoc"
subcategory = "spectrum"
short_description = "Weaves through the sound's analysis windows in a repeating step sequence"
description = "Moves through the sound's spectral analysis windows following a repeating sequence of steps (in windows, forward or backward) rather than playing them in their original order -- can create anything from a subtle time-smear to a fully scrambled, stuttering re-ordering of the sound's spectral content, depending on the step sequence."
input = "ana"
output = "ana"
stereo_native = false
output_is_stereo = false

[[process.params]]
name = "Weave Steps"
description = "Repeating sequence of steps (in analysis windows, positive = forward, negative = backward) through the sound"
automatable = true
required_list = true
kind = "number"
min = -1000.0
max = 1000.0
step = 1.0
default = 1.0
exponential = false
scale = "plain"
integer = true

# ---- Tier 1b (2026-07-13): tapdelay -- the first shipped ParamKind::Table process. Always
# emits a pan value for every tap (default 0.0 = centre) rather than making it a true
# optional column: verified against the real binary that a present-but-centred pan on every
# row still forces genuine stereo output deterministically, so `output_is_stereo` can stay a
# static catalog fact instead of needing a dynamic-channel-count mechanism (an otherwise
# real, unbuilt gap -- see CDP-Ext-Plan.md). `-f` (force float-precision output) is
# deliberately not exposed: CDP's own default already matches the infile's format, and this
# app's infile is always float32 unless `requires_simple_wav_input` -- so omitting the flag
# gets the same effective precision without a param that adds no real user-facing choice.
[[process]]
key = "tapdelay_tapdelay"
bin = "tapdelay"
title = "Tap Delay"
category = "time"
subcategory = "delay"
short_description = "Stereo multi-tapped delay with panning"
description = "Feeds the source into a delay line and reads back a set of independently-timed, -gained, and -panned taps, plus a feedback loop through the whole delay line -- can build anything from a single slap-back echo to a dense, panned rhythmic cascade depending on the tap table."
input = "wav"
output = "wav"
stereo_native = true
output_is_stereo = true
# Same WAVE_FORMAT_EXTENSIBLE incompatibility as rmverb/reverb: confirmed by hand
# (2026-07-14) that tapdelay fails ("unable to open outfile") against the float32 WAV
# `hound` writes for any >16-bit input, but succeeds against the identical audio written as
# plain 16-bit PCM.
requires_simple_wav_input = true

[[process.params]]
name = "Tap Gain"
description = "Gain factor applied to the delay line's output (typically around 0.25)"
automatable = false
kind = "number"
min = 0.01
max = 2.0
step = 0.01
default = 0.25
exponential = false
scale = "plain"

[[process.params]]
name = "Feedback"
description = "Proportion of the delay line's output fed back into itself"
automatable = false
kind = "number"
min = -1.0
max = 1.0
step = 0.01
default = 0.0
exponential = false
scale = "plain"

[[process.params]]
name = "Mix"
description = "Proportion of the source mixed in with the delayed output"
automatable = false
kind = "number"
min = 0.0
max = 0.99
step = 0.01
default = 0.5
exponential = false
scale = "plain"

[[process.params]]
name = "Taps"
description = "Delay taps: each row is a time/amplitude/pan triple; times must stay strictly ascending"
automatable = false
kind = "table"
time_column = 0

[[process.params.columns]]
name = "Time"
min = 0.001
max = 60.0
step = 0.01
default = 0.1
scale = "plain"

[[process.params.columns]]
name = "Amp"
min = 0.0
max = 1.0
step = 0.01
default = 0.5
scale = "plain"

[[process.params.columns]]
name = "Pan"
min = -1.0
max = 1.0
step = 0.01
default = 0.0
scale = "plain"

[[process.params]]
name = "Trail Time"
description = "Extra time (beyond the source's own duration) for the delay taps to play out"
automatable = false
kind = "number"
min = 0.0
max = 60.0
step = 0.1
default = 1.0
exponential = false
scale = "plain"

# ---- Tier 1b (2026-07-14): repeater -- second ParamKind::Table process, first with no
# ascending-order constraint (time_column omitted entirely -- segments may overlap or run
# backward per the binary's own usage text). Real ranges probed by hand against the binary:
# Repeat Count must be either exactly 0 ("no repeat") or an integer >= 2 (1 is specifically
# rejected -- "Repeat value less than 2"); mode 3's Accel/Warp/Fade ranges came back as clean
# CDP-reported errors (e.g. "Value (0.0) out of range (1.0 to 10.0)"). SEED (-s), despite
# being fully documented in the usage text, is rejected outright by this binary build
# ("Unknown flag -s") -- dropped, same "usage text/binary mismatch, not a tui-wave bug"
# precedent as iterline's earlier removal. RAND's real range differs by mode (1-2 for modes
# 1/3, 1-8 for mode 2) per the binary's own usage text.

[[process]]
key = "repeater_repeater_1"
bin = "repeater"
subprog = "repeater"
mode = "1"
title = "Repeater (Delay)"
category = "time"
subcategory = "texture"
short_description = "Repeats specified segments of the source in place, spaced by a delay"
description = "Plays the source while repeating a table of specified segments in place -- each row repeats that segment a given number of times, spaced by a delay between the start of one repeat and the next."
input = "wav"
output = "wav"
