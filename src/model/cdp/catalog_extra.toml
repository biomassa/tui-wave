# ---- Tier 1b batch 4 (2026-07-13): more required_envelope processes ----
#
# Continuing the plain-params-triage bucket list from Tier 0 batch 8's uncataloged-binary
# sweep. `suppress` (partials, TIMESLOTS param) was researched but deliberately NOT
# included: its second breakpoint column is itself an absolute end-*time* that must exceed
# the first column's start-time, not an arbitrary value the way every other
# `required_envelope` param's Y-axis is (a level, a pitch, a duration-to-insert) --
# `required_envelope`'s generic (time, value) editor has no way to express "column 2 must
# exceed column 1," and the editor's own never-opened seeding shape (3 points at
# [0, duration/2, duration] with values clustered near the field's own default/min/max) has
# no reason to produce valid start<end pairs for this specific semantic. Revisit if a
# start/end-pair variant of the envelope editor is ever built.

# `manysil` was tried here and deliberately NOT included: its SILENCEDATA envelope's very
# first point sits at time=0.0 in every `required_envelope` field's never-opened seeding
# (the general 3-point-bump shape `App::open_cdp_envelope_editor` seeds for any field to
# dodge the earlier fractal-hang bug always starts at t=0.0) -- and the real binary reliably
# fails a silence insertion exactly at time=0.0 with a misleading "ERROR: SYSTEM ERROR /
# Can't write to output soundfile: no memory to open sndfile" (confirmed: 0.001 works fine,
# 0.0 fails every time, on both single- and multi-point data, ruling out a WAV-format or
# point-count issue). This is a real, narrow binary constraint that conflicts with the
# generic seeding infra shared by every `required_envelope` field -- no per-process "minimum
# start time" override exists yet. Revisit if that infra is ever built.

