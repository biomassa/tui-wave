subprog = "subtract"
title = "Subtract"
category = "time"
subcategory = "combine"
short_description = "Subtracts a second (mono) sound from this one"
description = "This process subtracts a second sound (which must be mono, from another open buffer) from a chosen channel of this one, sample by sample -- useful for phase-cancellation-based difference extraction."
input = "dual_wav"
output = "wav"
stereo_native = false
output_is_stereo = false

[[process.params]]
name = "Channel"
description = "Which channel of the first sound to subtract from"
automatable = false
kind = "number"
min = 1.0
