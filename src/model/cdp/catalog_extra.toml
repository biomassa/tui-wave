# within that stated range (220, 440, both individually and combined). Since the *same*
# error appears regardless of the file's actual content or format, this reads as either an
# undocumented binary-specific file format this session didn't find, or a genuine parser bug
# in this CDP release -- not a catalog-argv-shape problem. Modes 1 and 2 (no tuning file)
# work fine and are shipped above.

# ---- Tier 0 batch 9 (2026-07-13): more plain-param processes (round 3) ----
#
# Continuing the plain-params bucket from Tier 0 batch 8's uncataloged-binary triage.
# `brownian`/`phasor` are the first candidates to actually test a channel-count param's
# safe values rather than assume the worst -- both mono and stereo output were verified
# clean against the real binary (no crash, unlike `shifter`'s stereo segfault last round),
# but the pipeline still has no mechanism for a param's own runtime value to change the
# planned output channel count (`ProcessDef.output_is_stereo` is a fixed, per-process
# declaration). Rather than build that now, each process's channel-count param is forced to
# whichever single value suits it best musically: `brownian` to mono (its spatial-position
# params are the only casualty, and the binary itself treats mono as a fully first-class,
# warning-free case), `phasor` to stereo (phase-interaction across space is the point of
