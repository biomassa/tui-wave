# ---- Psow batch (2026-07-15): pitch-synchronous-grain (FOF) family ----
# `psow` has 17 subprograms operating on pitch-synchronous grains extracted via a
# breakpoint pitch-envelope analysis (`pitch-brkpnt-data`, CDP's own bfil format --
# exactly the `required_envelope` shape already used elsewhere in this catalog, e.g.
# `focus_hold`/`rotor_rotor_1`). Every subprogram here takes a plain WAV directly (no
# `.ana` analysis file appears anywhere in any subprogram's usage text), hence
# `category = "time"` throughout. Bounds below were confirmed by hand against the real
# binary (feeding an out-of-range sentinel at each numeric argv position and reading back
# CDP's own "Value (...) out of range (min to max)" message) rather than trusting the
# usage text's own claimed ranges, which in several cases turned out to be wrong (noted
# per-process below). No fractional-value rejection was found anywhere in this family
# (every conceptually-integer count/index accepted a fractional probe value with exit 0),
# so no param here sets `integer = true` -- consistent with this catalog's existing policy
# of only setting that flag when hand-confirmed against a real rejection.
#
# Three of the 17 subprograms are deliberately NOT included:
# - `synth` (skipped per plan): its `[oscdatafile]` argument is a bespoke per-mode format
#   (freq/amp pairs, midipitch/amp pairs, or an unexplained "filter varibank" format) that
#   needs real research before it can be catalogued -- none of `ParamKind`'s existing
#   shapes obviously fit it sight unseen.
# - `locate` (skipped): its usage is `psow locate infil pitch-brkpnt-data time` -- there is
#   no `outfile` at all. It prints a computed time to stdout rather than writing a sound
#   file, so it doesn't fit this app's Command/pipeline shape (which always plans an
#   argv `outfile` token and reads back a resulting WAV) at all, independent of any
#   ParamKind question.
# - `chop` (skipped): `psow chop infile outfile pitch-brkpnt-data time-grain-pairs`
#   confirmed (by hand) to write MULTIPLE numbered output files (`outfile.wav`,
#   `outfile_001.wav`, `outfile_002.wav`, ...) for a multi-cut-point input -- a genuine
#   multi-output process like `distcut`/`envcut`, which this catalog already models via
#   `IoKind::WavGlob`. But `WavGlob`'s planner (`pipeline::plan_wav_glob`) hardcodes the
#   literal prefix `"cutout"` and assumes CDP's own contiguous-from-0 `<prefix>N.wav`
#   naming (`distcut`/`envcut`'s convention) -- `chop`'s actual naming (base name unchanged
#   for the first file, then `_001`/`_002` zero-padded with an underscore for the rest)
#   doesn't match that hardcoded shape at all. Fitting it would mean generalizing
#   `plan_wav_glob`'s prefix/numbering assumption in `pipeline.rs`, which this batch was
#   told not to touch -- skipped rather than forced.

[[process]]
key = "psow_stretch"
bin = "psow"
subprog = "stretch"
title = "Psow Stretch"
category = "time"
subcategory = "texture"
short_description = "Timestretches/transposes a sound by repositioning its pitch-synchronous grains"
description = """
Time-stretches (or shrinks) a sound by repositioning its pitch-synchronous grains (FOFs) \
along the timeline without stretching the grains themselves -- a chunk of grains is \
retained as-is while the gaps between chunks are stretched, giving a different character \
to plain phase-vocoder time-stretching.
"""
input = "wav"
output = "wav"
stereo_native = false
output_is_stereo = false

[[process.params]]
name = "Pitch Envelope"
description = "Breakpoint pitch envelope (Hz) tracking the source's fundamental -- may contain silence-gap zeros but must contain some real frequency values (never a pitch-tracking zero)"
automatable = true
required_envelope = true
kind = "number"
min = 20.0
max = 10000.0
step = 1.0
default = 220.0
exponential = true
scale = "plain"

[[process.params]]
name = "Timestretch"
