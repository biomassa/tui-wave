description = "This process splits a mono signal into several streams that phase-shift forward and back against each other, producing a chorus/flange-like phase-interaction texture across the output channels."
input = "wav"
output = "wav"
stereo_native = false
output_is_stereo = true

[[process.params]]
name = "Streams"
description = "Number of interacting streams"
automatable = false
kind = "number"
min = 2.0
max = 8.0
step = 1.0
default = 3.0
exponential = false
scale = "plain"

[[process.params]]
name = "Phase Frequency"
description = "Frequency of the phase-shift packets"
automatable = true
kind = "number"
min = 0.01
max = 50.0
step = 0.01
default = 3.0
exponential = true
scale = "plain"

[[process.params]]
name = "Shift"
description = "Maximum phase-shift within a packet, in semitones"
automatable = true
kind = "number"
min = 0.0
max = 12.0
step = 0.1
default = 3.0
exponential = false
scale = "plain"

[[process.params]]
name = "Output Channels"
description = "Fixed at stereo output"
automatable = false
kind = "choice"
options = ["2"]
default = 0

[[process.params]]
name = "Stream Offset"
description = "Time-offset of the most-offset stream; other streams offset by intermediate amounts"
automatable = false
kind = "number"
min = 0.0
max = 500.0
step = 1.0
default = 0.0
exponential = false
scale = "plain"
flag = "-o"

[[process.params]]
name = "Print Rounding Warnings"
description = "Print warnings about rounding errors when calculating the time-shifted streams"
automatable = false
kind = "toggle"
default = false
flag = "-e"

