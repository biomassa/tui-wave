# ---- Tier 1b (2026-07-14): focus freeze -- the first shipped ParamKind::MarkerTimeList
# process. Confirmed against the real binary: the marker character must be concatenated
# directly onto the time with no separator ("a0.3", never "a 0.3" -- the latter is rejected
# as an "unknown time flag"); a bare time with no marker at all is rejected outright ("No
# flags given in freeze data"), so the marker is genuinely mandatory, not the optional-
# looking thing the usage text's "MAY be preceded by" wording suggests. Times must stay
# strictly ascending across rows ("Time values out of sequence"). Also found: an 'a' marker
# followed later by any 'b' marker is rejected as an "Impossible time sequence" -- a real,
# data-dependent constraint of the freeze algorithm itself, left to CDP's own runtime error
# rather than replicated client-side (every other combination -- aa, ba, bb -- succeeds).

