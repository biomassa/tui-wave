title = "Reposition"
category = "time"
subcategory = "texture"
short_description = "Repositions a grainy sound's grain onsets to a specified list of times"
description = """
Repositions the onsets of grains detected in the source at a list of specified times, \
reshaping the sound's rhythm without altering the grains themselves. An inter-grain time \
reduced below 0.032s by the new positions is clamped up to that minimum.
"""
input = "wav"
output = "wav"
stereo_native = false
output_is_stereo = false

[[process.params]]
name = "Grain Onset Times"
description = "Ordered list of times (seconds) each grain's onset is repositioned to; must stay strictly ascending"
automatable = true
required_list = true
list_is_time_sequence = true
kind = "number"
min = 0.0
max = 7200.0
step = 0.01
default = 0.0
exponential = false
scale = "plain"

[[process.params]]
name = "Offset"
description = "Value (seconds) added to every grain timing after repositioning"
automatable = false
kind = "number"
min = -60.0
max = 60.0
step = 0.01
default = 0.0
exponential = false
scale = "plain"

[[process.params]]
name = "Max Inter-Grain Time"
description = "Maximum time gap between detected grains (CDP additionally caps this at the selection's own duration, with a fixed 0.1s floor)"
