automatable = true
kind = "number"
min = 0.0
max = 7200.0
step = 0.01
default = 0.5
exponential = false
scale = "capped_at_input_duration"

[[process.params]]
name = "Min Duration"
description = "Minimum duration of the found packet, in milliseconds"
automatable = true
kind = "number"
min = 1.0
max = 5000.0
step = 1.0
default = 100.0
exponential = true
scale = "plain"

[[process.params]]
name = "Narrowing"
description = "Narrowing of the packet's envelope (values below 1.0 broaden it; very low values near 0 may click)"
automatable = true
kind = "number"
min = 0.0
max = 1000.0
step = 0.1
default = 5.0
exponential = true
scale = "plain"

[[process.params]]
name = "Centring"
description = "Position of the packet's envelope centre within its duration (0 = left, 1 = right)"
automatable = true
kind = "number"
min = 0.0
max = 1.0
step = 0.01
default = 0.5
exponential = false
scale = "plain"
