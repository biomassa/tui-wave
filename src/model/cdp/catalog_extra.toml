# ---- Phase 4 (2026-07-13): pitch-family processes reachable via existing infra ----
#
# Original Phase 4 sketch assumed the whole `pitch`/`repitch` family needed new binary
# `.frq` infrastructure. Investigating `repitch getpitch` (which produces the PITCHFILE
# these processes consume) found mode 2 produces a *plain text* breakpoint file (time/Hz
# pairs) -- and `pitch altharms`/`octmove` accept that text file directly, confirmed
# against the real binary. That's exactly the `required_envelope` shape Phase 3 already
# built; only `getpitch` mode 1's *binary* pfil output genuinely needs new infra. Several
# other `pitch`/`repitch` subprograms turned out to need no pitch data at all (plain
# params) or a flat value list (`required_list`). The remaining `repitch` subprograms that
# transform a pitchfile into another pitchfile (exag/invert/quantise/randomise/smooth/
# vibrato) are a genuinely different shape -- no audio file at all, pitchfile-in-
# pitchfile-out -- deferred pending a first-class pitch-curve document concept.

# `pitch altharms`/`pitch octmove` were tried here and, despite the required_envelope
# pitchfile format being confirmed to work (see above), deliberately NOT included at the
# time: their real argv order is `infile pitchfile outfile` -- the pitchfile comes BEFORE
# outfile, not after it, and no process shape this pipeline built could place a required
# param before outfile yet. Confirmed by reproducing the exact failure: our runner emitted
# `[infile, outfile, brk_file...]`, and CDP read our *outfile's own name* as the pitchfile
# argument, failing with "Can't open brkpntfile <outfile> to read data."
#
# ---- Follow-up (2026-07-17): the datafile-before-outfile gap is now solved ----
# `ParamDef.before_outfile` (see `def.rs`) marks a param whose argv token belongs between
# the infile(s) and outfile; `pipeline::build_process_args` emits every `before_outfile`
# param first, then outfile, then everything else -- exactly the shape this pair of
# processes (and `formants put`, if it's ever added) needs. `pitch_altharms_1`/`_2` and
# `pitch_octmove_1`/`_2`/`_3` below are the first two processes to use it, both confirmed
# against the real binary with the same required_envelope text pitchfile shape noted above.
#
# One real caveat worth keeping in mind for whoever uses these: CDP's own usage text says
# "PITCHFILE must be derived from infile" -- i.e. it wants the *actual detected pitch* of
# the exact same audio being processed (e.g. via Extract Pitch Curve, CDP-Ext-Plan.md
# Phase 4), not an arbitrary hand-drawn envelope. The `required_envelope` field here will
# happily accept any hand-drawn breakpoint curve without error (CDP doesn't validate that
# the pitchfile "belongs" to the input signal), but the harmonic-deletion/octave-transpose
# math these two processes do is built around a real pitch track -- a made-up curve will
# run without error but likely won't do anything musically sensible. There's no UI path
# yet to feed a stored `PitchCurve` (the Tier 2 pitch-curve document type) directly into a
# `required_envelope` field -- that's the still-open "wiring a stored curve into
# required_envelope params" item.

[[process]]
key = "pitch_altharms_1"
bin = "pitch"
subprog = "altharms"
mode = "1"
title = "Pitch Delete Alternate Harmonics (Odd)"
category = "pvoc"
subcategory = "pitch"
short_description = "Deletes odd harmonics, usually producing an octave-up transposition with no formant change"
description = "Deletes every odd-numbered harmonic from the spectrum, following a pitch track derived from the same sound (see the comment above this entry for what the Pitchfile field needs to actually contain). Usually produces an octave-up transposition while leaving the formant/timbre character alone -- unlike a plain pitch-shift, which also shifts the formants."
input = "ana"
output = "ana"
stereo_native = false
output_is_stereo = false

[[process.params]]
name = "Pitchfile"
description = "Time/Hz breakpoint pitch track of this same sound (see the comment above this catalog entry -- CDP expects a real detected pitch track, not an arbitrary curve)"
automatable = true
required_envelope = true
before_outfile = true
kind = "number"
min = 20.0
max = 10000.0
step = 1.0
default = 220.0
exponential = true
scale = "plain"

[[process.params]]
name = "Alternative Reconstruction"
description = "Uses an alternative spectral reconstruction method"
flag = "-x"
automatable = false
kind = "toggle"
default = false

