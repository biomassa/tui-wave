# Title-only overrides applied on top of catalog.toml/catalog_extra.toml -- see
# CdpCatalog::load / apply_title_overrides in catalog.rs for how this is merged, and
# CDP-WASM-SUITE-analysis.md for the naming rationale (this file is that proposal's
# renames, applied). Safe to hand-edit; each entry only ever touches `title`, never the
# rest of the process definition, so it survives catalog.toml being regenerated.
#
# Titles that wouldn't otherwise reveal their own CDP binary get an "-- <bin>" suffix
# (e.g. "Waveset Average -- distort") to satisfy
# catalog::tests::builtin_titles_reveal_their_own_cdp_binary, which exists so a
# process's CDP family is never invisible in the UI (user report, 2026-07-14) even
# though the browser's Groups column filters by semantic subcategory, not by binary.

