exponential = true
scale = "plain"

[[process]]
key = "focus_accu"
bin = "focus"
subprog = "accu"
title = "Focus Accumulate"
category = "pvoc"
subcategory = "time"
short_description = "Sustain each spectral band until louder data appears in that band"
description = "Frequencies are sustained into subsequent windows. The Overalll effect is one of sustaining, but one which also makes the spectrum more complex.\n\nThe Glissandos parameter produces glissandos within the spectrum of the sound. Very effective slow glissandos are produced when Glissandos is near 0, e.g., -0.9 or 0.1. At 0.5, there are several glissandos, at 1, they are fairly fast, and at 10 it becomes a wash.\n"
input = "ana"
output = "ana"
stereo_native = false
output_is_stereo = false

[[process.params]]
name = "Decay"
description = "Amount for each sustained band to decay each second"
flag = "-d"
automatable = true
kind = "number"
min = 0.001
max = 1.0
step = 0.001
default = 0.5
exponential = false
scale = "plain"

[[process.params]]
name = "Glissandos"
description = "Amount each sustained band glissandos in octaves per second"
flag = "-g"
automatable = true
kind = "number"
min = -5.0
max = 10.0
step = 0.1
default = -0.5
exponential = false
scale = "plain"

[[process]]
key = "focus_exag"
bin = "focus"
subprog = "exag"
title = "Focus Exaggerate"
category = "pvoc"
subcategory = "spectrum"
short_description = "Exaggerates the spectral contour"
description = "This process looks for peaks or troughs in the dynamic range of the sound and then exaggerates the spectral content of those to shift the overall timbre of the sound. Values less than 1 will emphasise the frequencies in the troughs often bringing out pitched resonances, values greater than 1 will bring out the frequencies in the transient peaks often adding a bright buzzy timbre. "
input = "ana"
output = "ana"
stereo_native = false
output_is_stereo = false

[[process.params]]
name = "Exaggeration"
description = "<1 emphasise troughs, >1 emphasise peaks"
automatable = true
kind = "number"
min = 0.25
max = 4.0
step = 0.01
default = 0.5
exponential = false
scale = "plain"

[[process]]
key = "focus_focus"
bin = "focus"
subprog = "focus"
title = "Focus"
category = "pvoc"
subcategory = "spectrum"
short_description = "Filters sound through prominent peak frequencies"
description = "Focus identifies a number of peaks in the sound and analyses the prominent frequencies in those peaks. It then filters the entire sound through those frequencies imposing the spectral content of the peaks onto the entire sound. "
input = "ana"
output = "ana"
stereo_native = false
output_is_stereo = false

[[process.params]]
name = "Number of Frequency Bands"
description = "The number of bands to filter the sound through"
flag = "-p"
automatable = false
kind = "number"
min = 1.0
max = 12.0
step = 1.0
default = 7.0
exponential = false
scale = "plain"

[[process.params]]
name = "Number of peaks to find"
description = "The number of peaks the process will find and analyse"
automatable = false
kind = "number"
min = 1.0
max = 16.0
step = 1.0
default = 16.0
exponential = false
scale = "plain"

[[process.params]]
name = "Bandwidth"
description = "The width of the filters, the smaller the number the narrow the filters"
automatable = true
kind = "number"
min = 0.1
max = 10.0
step = 0.01
default = 0.3
exponential = true
scale = "plain"

[[process]]
key = "focus_fold"
bin = "focus"
subprog = "fold"
title = "Focus Fold"
category = "pvoc"
subcategory = "pitch"
short_description = "Transposes the frequency spectrum to a set range"
description = "This process takes a minimum and maximum frequency range and moves all frequencies outside of this into that range. It does this by transposing the frequencies in octaves, attempting to retain the harmonic relationships within the frequency spectrum. This generally works best with fairly narrow ranges between lowest and highest frequencies."
input = "ana"
output = "ana"
stereo_native = false
output_is_stereo = false

[[process.params]]
name = "Lowest Frequency"
description = "The lowest frequency in the output sound"
automatable = true
kind = "number"
min = 20.0
max = 20000.0
step = 0.01
default = 880.0
exponential = true
scale = "plain"

[[process.params]]
name = "Highest Frequency"
description = "The highest frequency in the output sound"
automatable = true
kind = "number"
min = 20.0
max = 20000.0
step = 0.01
default = 1760.0
exponential = true
scale = "plain"

[[process]]
key = "focus_step"
bin = "focus"
subprog = "step"
title = "Focus Stepped Freeze"
category = "pvoc"
subcategory = "time"
short_description = "Freezes the spectrum of the sound at regular intervals"
description = "Moves through the sound from start to end and freezes the spectrum of the sound at a regular interval. With fast clock speeds this produces a granular like effect, with slow clock speeds this freezes the sound in place creating an audible step from freeze to freeze. This process works well with Blur to to smooth out the boundaries between steps. "
input = "ana"
output = "ana"
stereo_native = false
output_is_stereo = false

[[process.params]]
name = "Clock Speed"
