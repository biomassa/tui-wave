[[process]]
key = "modify_revecho_2"
bin = "modify"
subprog = "revecho"
mode = "2"
title = "Modify Delay with Modulation"
category = "time"
subcategory = "delay"
short_description = "Delays a signal with optional LFO modulation over delay time"
description = "This process plays the audio through a delay line which can be fed back onto itself to create multiple repetitions of the sound. The delay time of the process can be modulated to change over time. With short delay times and small amounts of modulation depth and slow modulation speed this will create chorus and flanger like effects. With longer delay times and higher modulation depth and slow modulation speed this will create audible pitch bends in the sound. With fast modulation speeds this will create an FM like effect producing new higher harmonics in the sound. If modulation frequency is set positive the modulation will be a repeating sine waveform, when set negative the modulation will be random values."
input = "wav"
output = "wav"
stereo_native = true
output_is_stereo = false

[[process.params]]
name = "Delay Time"
description = "The delay time before modulation in ms"
automatable = false
kind = "number"
min = 0.03
max = 1000.0
step = 0.01
default = 250.0
exponential = false
scale = "plain"

[[process.params]]
name = "Dry/Wet"
description = "The balance between the original signal and the delayed signal 0 = dry, 1 = wet"
automatable = false
kind = "number"
min = 0.0
max = 1.0
step = 0.01
default = 0.5
exponential = false
scale = "plain"

[[process.params]]
name = "Feedback"
description = "Higher values = more repetitions of the sound, with negative values the phase of the feedback is inverted"
automatable = false
kind = "number"
min = -1.0
max = 1.0
step = 0.01
default = 0.5
exponential = false
scale = "plain"

[[process.params]]
name = "Modulation Depth"
description = "How much to modulate the delay time by"
automatable = false
kind = "number"
min = 0.0
max = 1.0
step = 0.01
default = 0.1
exponential = false
scale = "plain"

[[process.params]]
name = "Modulation Speed"
description = "The speed of the modulation in Hz, negative values = random modulation, positive values = sinusoidal modulation"
automatable = false
kind = "number"
min = -50.0
max = 50.0
step = 0.01
default = 1.0
exponential = false
scale = "plain"

[[process.params]]
name = "Modulation Phase"
description = "The starting phase of the modulation waveform"
automatable = false
kind = "number"
min = 0.0
max = 1.0
step = 0.01
default = 0.0
exponential = false
scale = "plain"

[[process.params]]
name = "Modulation Start Time"
description = "The point in the input in percent where modulation should begin"
automatable = false
kind = "number"
min = 0.0
max = 100.0
step = 0.01
default = 0.0
exponential = false
scale = "percent_of_input_duration"

[[process.params]]
name = "Tail"
description = "The amount of silence in seconds to add to the end of the input to avoid cutting off delay tails"
automatable = false
kind = "number"
min = 0.0
max = 30.0
step = 0.01
default = 10.0
exponential = false
scale = "plain"

[[process]]
key = "modify_sausage"
bin = "modify"
subprog = "sausage"
title = "Modify Multi-Brassage"
category = "time"
subcategory = "texture"
short_description = "Granular segmentation/fragmentation on multiple inputs"
description = "This process moves through the input files from start to end at the speed set by scan speed. How linearly it moves through the file is set by the Search Range and Jitter. \n\nAs it moves through the files it cuts out small chunks - called grains - of the files and plays those back alternating between the different inputs. The length of those grains and how they fade in and out is set by the Grain Size, Attack and Decay. The pitch of the grains is set by Pitch Shift. \n\nHow many grains play back is set by the Density, densities less than 1 will create gaps between grains, densities higher than 1 will cause grains to overlap and merge. \n\nFinally the sound can be panned from left to right with Panning and the Overalll level of the sound can be adjusted with Amplitude. \n\nThe various \"limit\" parameters provide a range within which the process can choose to vary the values between. E.g. setting Density to 2 and the limit to 4 will allow the process to choose random values between 2 and 4 for density.\n\nThis process works particularly well when automation is applied to many parameters to make it shift and change over time. \n"
input = "dual_wav"
output = "wav"
stereo_native = true
output_is_stereo = true

[[process.params]]
name = "Scan Speed"
description = "How fast to move through the file, 1 = original speed, 2 = double speed, 0.5 = half speed"
automatable = true
kind = "number"
min = 0.1
max = 10.0
step = 0.01
default = 1.0
exponential = true
scale = "plain"

[[process.params]]
name = "Density"
description = "Amount of grain overlap, values less than 1 create gaps"
automatable = true
kind = "number"
min = 0.2
max = 8.0
step = 0.01
default = 2.0
exponential = false
scale = "plain"

[[process.params]]
name = "Scan Speed Limit"
description = "The range of random variation applied to the Scan Speed"
automatable = true
kind = "number"
min = 0.1
max = 10.0
step = 0.01
default = 1.0
exponential = true
scale = "plain"

[[process.params]]
name = "Density Limit"
description = "The range of random variation applied to Density"
automatable = true
kind = "number"
min = 0.2
max = 8.0
step = 0.01
default = 2.0
exponential = false
scale = "plain"

[[process.params]]
name = "Grain Size"
description = "Length of grains in ms"
automatable = true
kind = "number"
min = 2.0
max = 200.0
step = 0.01
default = 50.0
exponential = false
scale = "plain"

[[process.params]]
name = "Pitch Shift"
description = "Amount to shift pitch of grain in semitones"
automatable = true
kind = "number"
min = -24.0
max = 24.0
step = 0.01
default = 0.0
exponential = false
scale = "plain"

[[process.params]]
name = "Amplitude"
description = "Overall amplitude of the output"
automatable = true
kind = "number"
min = 0.01
max = 1.0
step = 0.01
default = 1.0
exponential = true
scale = "plain"

[[process.params]]
name = "Panning"
description = "Panning of grains from left to right"
automatable = true
kind = "number"
min = 0.0
max = 1.0
step = 0.01
default = 0.5
exponential = false
scale = "plain"

[[process.params]]
name = "Attack"
description = "Amount of time in ms each grain takes to fade in"
automatable = true
kind = "number"
min = 1.0
max = 20.0
step = 0.01
default = 5.0
exponential = false
scale = "plain"

[[process.params]]
name = "Decay"
description = "Amount of time in ms each grain takes to fade out"
automatable = true
kind = "number"
min = 1.0
max = 20.0
step = 0.01
default = 5.0
exponential = false
scale = "plain"

[[process.params]]
name = "Grain Size Limit"
description = "The range of random variation applied to Grain Size"
automatable = true
kind = "number"
min = 2.0
max = 200.0
step = 0.01
default = 50.0
exponential = false
scale = "plain"

[[process.params]]
name = "Pitch Shift Limit"
description = "The range of random variation applied to Pitch Shift"
automatable = true
kind = "number"
min = -24.0
max = 24.0
step = 0.01
default = 0.0
exponential = false
scale = "plain"

[[process.params]]
name = "Amplitude Limit"
description = "The range of random variation applied to Amplitude"
automatable = true
kind = "number"
min = 0.1
max = 1.0
step = 0.01
default = 1.0
exponential = true
scale = "plain"

[[process.params]]
name = "Panning Limit"
description = "The range of random variation applied to Panning"
automatable = true
kind = "number"
min = 0.0
max = 1.0
step = 0.01
default = 0.5
exponential = false
scale = "plain"

[[process.params]]
name = "Attack Limit"
description = "The range of random variation applied to Attack"
automatable = true
kind = "number"
min = 1.0
max = 20.0
step = 0.01
default = 5.0
exponential = false
scale = "plain"

[[process.params]]
name = "Release Limit"
description = "The range of random variation applied to Release"
automatable = true
kind = "number"
min = 1.0
max = 20.0
step = 0.01
default = 5.0
exponential = false
scale = "plain"

[[process.params]]
name = "Search Range"
description = "Distance to move while looking for next grain"
flag = "-r"
automatable = true
kind = "number"
min = 1.0
max = 200.0
step = 0.01
default = 1.0
exponential = false
scale = "plain"

[[process.params]]
name = "Jitter"
description = "Amount of randomisation of grain position"
flag = "-j"
automatable = true
kind = "number"
min = 0.0
max = 1.0
step = 0.01
default = 0.5
exponential = false
scale = "plain"

